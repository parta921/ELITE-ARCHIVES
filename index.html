<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE | THE DEEP ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-sea: #001219;
            --ocean-blue: #003049;
            --midnight-blue: #005f73;
            --cyan-sea: #94d2bd;
            --coral: #ff4d6d;
            --sand: #e9d8a6;
            --font-pixel: 'VT323', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--deep-sea);
            color: var(--sand);
            font-family: 'DotGothic16', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(180deg, #002147 0%, #001219 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* --- DECORATIONS --- */
        .fish { position: fixed; font-size: 2rem; z-index: 1; opacity: 0.3; pointer-events: none; }
        @keyframes swim-right { from { transform: translateX(-100px) scaleX(-1); } to { transform: translateX(110vw) scaleX(-1); } }
        
        .bubble {
            position: fixed; bottom: -50px; background: rgba(255, 255, 255, 0.1);
            border-radius: 50%; animation: rise infinite ease-in; z-index: 0; pointer-events: none;
        }
        @keyframes rise { from { transform: translateY(0); opacity: 0.5; } to { transform: translateY(-110vh); opacity: 0; } }

        /* --- MUSIC PLAYER --- */
        #music-container {
            position: fixed; bottom: 90px; right: 20px; z-index: 2000;
            background: var(--sand); border: 4px double black; padding: 8px 12px;
            cursor: pointer; font-family: var(--font-pixel); box-shadow: 4px 4px 0px var(--coral);
            display: flex; align-items: center; gap: 8px; color: black; transition: 0.2s;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 1000; width: 95%; max-width: 500px;
        }
        .nav-tab {
            background: var(--sand); border: 3px solid black; padding: 10px 5px;
            font-family: var(--font-pixel); font-size: 1.2rem; color: black;
            cursor: pointer; box-shadow: 4px 4px 0px var(--coral); transition: 0.3s; flex: 1; text-align: center;
        }
        .nav-tab:hover, .active-tab { background: var(--coral); color: white; transform: translateY(-3px); }

        /* --- SEARCH --- */
        .search-container { margin: 20px auto 30px; width: 100%; max-width: 600px; text-align: center; }
        .search-input {
            width: 90%; padding: 12px; border: 4px solid black;
            background: var(--sand); font-family: var(--font-pixel); font-size: 1.5rem; outline: none;
            box-shadow: 5px 5px 0px var(--ocean-blue);
        }

        /* --- GRID & CARDS --- */
        main { padding: 30px 5% 150px; position: relative; z-index: 10; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.5s ease; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        @media (max-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 700px) { .grid { grid-template-columns: repeat(2, 1fr); } }

        .scrap-card {
            background: #fff; border: 2px solid #000; padding: 10px 10px 30px 10px;
            position: relative; transition: 0.3s; cursor: pointer; color: black;
            background-image: linear-gradient(#e5e5e5 1px, transparent 1px), linear-gradient(90deg, #e5e5e5 1px, transparent 1px);
            background-size: 15px 15px; box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
        }
        .card-frame { background: #000; aspect-ratio: 1/1; border: 2px solid black; margin-bottom: 15px; overflow: hidden; }
        .card-frame img { width: 100%; height: 100%; object-fit: cover; }
        .tape-deco { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 60px; height: 20px; background: rgba(148, 210, 189, 0.6); border-left: 2px dashed rgba(0,0,0,0.1); border-right: 2px dashed rgba(0,0,0,0.1); }

        /* --- MODAL --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center;
            padding: 15px;
        }
        .modal-content { 
            background: var(--sand); border: 5px solid black; padding: 20px; 
            max-width: 350px; width: 100%; color: black; text-align: center; 
            max-height: 85vh; overflow-y: auto; position: relative;
            display: flex; flex-direction: column; gap: 10px;
            box-shadow: 10px 10px 0px var(--coral);
        }
        #m-img { 
            width: 100%; 
            height: auto; 
            max-height: 250px; 
            object-fit: cover; 
            border: 3px solid black; 
            flex-shrink: 0; 
        }
        .detail-line { text-align: left; border-top: 2px dashed black; padding-top: 10px; font-size: 0.9rem; word-wrap: break-word; overflow-wrap: break-word; }
        #m-quote-container { margin-top: 10px; padding: 12px; background: rgba(0,0,0,0.07); border-left: 4px solid var(--coral); font-style: italic; font-size: 0.95rem; line-height: 1.5; text-align: left; }
        .close-btn { width: 100%; margin-top: 15px; background: black; color: white; padding: 12px; border: none; cursor: pointer; font-family: var(--font-pixel); font-size: 1.2rem; flex-shrink: 0; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="fish" style="top:15%; animation: swim-right 25s linear infinite;">🐠</div>
    <div class="fish" style="top:65%; animation: swim-right 35s linear infinite;">🐡</div>

    <audio id="bgm" loop><source src="lagu_sheila.mp3" type="audio/mpeg"></audio>

    <div id="music-container" onclick="toggleMusic()">
        <span id="music-icon">🔇</span> <span id="music-text">AUDIO: OFF</span>
    </div>

    <nav>
        <div id="tabHome" class="nav-tab active-tab" onclick="showPage('home')">HOME</div>
        <div id="tabMoment" class="nav-tab" onclick="showPage('moment')">MOMENTS</div>
        <div id="tabProfile" class="nav-tab" onclick="showPage('profile')">PROFILES</div>
    </nav>

    <main>
        <section id="home" class="page active">
            <div style="min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                <div style="width: 100%; max-width: 400px; margin-bottom: 30px; padding: 0 20px;">
                    <div class="scrap-card" style="transform: rotate(-1deg);">
                        <div class="tape-deco" style="background: rgba(255, 77, 109, 0.6); width: 100px;"></div>
                        <div class="card-frame" style="aspect-ratio: 16/9;"><img src="cover.jpeg"></div>
                        <div style="font-family: var(--font-pixel); text-align: center; margin-top: 10px;">
                            <p style="font-size: 1.5rem;">[ KELUARGA BESAR ELITE ]</p>
                            <p style="font-size: 0.8rem; opacity: 0.7;">"Dan kau bisikkan kata bahagia..."</p>
                        </div>
                    </div>
                </div>
                <h1 style="font-family: var(--font-pixel); font-size: 3rem; color: var(--cyan-sea); text-shadow: 3px 3px 0px var(--coral), 5px 5px 0px black; text-align:center;">THE DEEP ARCHIVE</h1>
            </div>
        </section>

        <section id="moment" class="page">
            <h2 style="font-family:var(--font-pixel); font-size:2.5rem; text-align:center; margin-bottom:30px; color:var(--coral);">#SNAPSHOTS</h2>
            <div class="grid" id="moment-grid"></div>
        </section>

        <section id="profile" class="page">
            <div id="walikelas-container"></div>
            <div class="search-container">
                <input type="text" class="search-input" id="searchBar" placeholder="Cari nama..." onkeyup="filterProfiles()">
            </div>
            <div class="grid" id="profile-grid"></div>
        </section>
    </main>

    <div id="modal" class="modal" onclick="closeZoom()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="m-img" src="">
            <h2 id="m-title" style="font-family:var(--font-pixel); font-size:1.8rem; color:var(--coral);"></h2>
            <div class="detail-line">
                <div id="m-info-personal">
                    <p><strong>Lahir:</strong> <span id="m-birth"></span></p>
                    <p><strong>Cita-cita:</strong> <span id="m-dream"></span></p>
                </div>
                <div id="m-quote-container">
                    "<span id="m-quote"></span>"
                </div>
            </div>
            <button class="close-btn" onclick="closeZoom()">[ KEMBALI ]</button>
        </div>
    </div>

    <script>
        const studentData = [
            { name: "Adam Natha Utama Sembiring", birth: "12 Des 2010", dream: "Engineering", quote: "Jika hidupmu hanya mengikuti arus, kamu tidak akan tahu di mana puncaknya." },
            { name: "Amira Raisyah Putri", birth: "27 Feb 2011", dream: "Business Woman", quote: "Trust your journey, everyone has their own timeline." },
            { name: "Ariqah Salsabila Nasution", birth: "6 Jun 2011", dream: "Hakim", quote: "Don't let 365 days be bad, just because 5 minutes went wrong." },
            { name: "Athaya Syakira", birth: "14 Sep 2010", dream: "Investor", quote: "Jadilah baik untuk dirimu sendiri, baru untuk orang lain." },
            { name: "Ayesha Navila", birth: "3 Feb 2011", dream: "Figure Skater", quote: "Orang yang melihat terlalu banyak ke belakang tidak akan bisa maju." },
            { name: "Bianca Syifa Kaleela", birth: "30 Jun 2011", dream: "Dokter", quote: "You can't change the way people treat you, but you can change how you react." },
            { name: "Chaira Nabila Hafit", birth: "13 Jan 2012", dream: "Songwriter", quote: "Believe you can and you're halfway there." },
            { name: "Chalisa Zhafira Perdana", birth: "23 Jul 2011", dream: "Designer", quote: "Thankyou for being the victim of my success one day." },
            { name: "Dhiyaz Farshad", birth: "24 Mar 2011", dream: "Psikolog Klinis", quote: "Learn from people who have been where you want to be." },
            { name: "Domuan Raja Siregar", birth: "13 Sep 2011", dream: "Dokter", quote: "Selalu berusaha dan berdoa agar semua impian tercapai." },
            { name: "Fachri Pratama Sutowo", birth: "13 Jun 2010", dream: "Dosen", quote: "Apa yang untukmu tidak akan melewatkanmu." },
            { name: "Faris Mumtaz Lesmana", birth: "2 Jun 2011", dream: "IPDN", quote: "Berhasil atau gagal, rayakanlah usahamu hari ini." },
            { name: "Farizqy Muhammad Al Hasby", birth: "15 Des 2011", dream: "Pengusaha", quote: "Jangan biarkan ketakutan menghalangimu mencoba hal baru." },
            { name: "Fasya Yasmin", birth: "5 Mar 2011", dream: "Pengusaha", quote: "Hidup adalah tentang menghargai setiap momen kecil bersama mereka." },
            { name: "Fatiha Syahira Lubis", birth: "17 Juli 2011", dream: "Businesswoman", quote: "Slow but steady wins the race." },
            { name: "Fawwaz Rizieq Abqory", birth: "24 Juni 2011", dream: "Dokpol", quote: "Kegagalan adalah tahap proses menuju kesuksesan yang nyata." },
            { name: "Nayra Azzahra", birth: "17 Agustus 2011", dream: "CEO", quote: "Thankyou for being part of my memory in this blue archive." },
            { name: "Noura Aqilah A. Hsb", birth: "30 September 2010", dream: "Pengusaha", quote: "Hatred is an easier word than understanding, but understanding is better." },
            { name: "Raihanah Azahra", birth: "22 Agustus 2011", dream: "Apoteker", quote: "Memories don't ask permission to come, they just arrive." },
            { name: "Rakayla Aseika", birth: "3 Juli 2011", dream: "Pengusaha", quote: "If you fail once, try again until the world knows your name." },
            { name: "Raudhatul Andila", birth: "10 Januari 2011", dream: "-", quote: "Chase that dream as far as the ocean goes." },
            { name: "Riffat Pangeran Fateen", birth: "6 Desember 2011", dream: "Musisi", quote: "Orang mendatangi makanan, bukan sebaliknya." },
            { name: "Rizky Maulana", birth: "11 Oktober 2011", dream: "Bisnismen", quote: "Capek itu wajar, menyerah itu yang jangan sampai kejadian." },
            { name: "Shidiq Arifin Partadisastra", birth: "13 November 2010", dream: "CEO", quote: "Don’t let the shadows of yesterday spoil the sunshine of tomorrow." },
            { name: "Sultan Alif Ramdani", birth: "6 Juli 2011", dream: "Pengusaha", quote: "Diam dan fokus bekerja sampai hasilnya yang berbicara." },
            { name: "Syaamil Maulana Ibrahim", birth: "11 Februari 2011", dream: "Character Designer", quote: "Tenang bukan berarti lemah, ombak yang tenang menyimpan kekuatan." },
            { name: "T.M. Azka Putra", birth: "13 Mei 2011", dream: "Pengusaha", quote: "Jika belum menemukan orang baik, jadilah salah satunya." },
            { name: "Vira Amalia", birth: "21 September 2010", dream: "Pelukis", quote: "People only hear what they want to hear." },
            { name: "Zaqiya Shafa Humaira", birth: "23 Agustus 2011", dream: "Mangaka", quote: "Create your own lore in this massive world." },
            { name: "Zayyan Kaisan Musdan", birth: "5 Mei 2011", dream: "Perkantoran", quote: "Jika ingin dihargai, mulailah dengan menghargai waktu." }
        ];

        // Init Profiles
        document.getElementById('walikelas-container').innerHTML = `
            <div class="scrap-card" style="max-width:350px; margin: 0 auto 30px;" onclick="openWk()">
                <div class="tape-deco" style="background:var(--coral);"></div>
                <div style="display:flex; gap:15px; align-items:center;">
                    <img src="0.jpg" style="width:60px; height:60px; border:2px solid black; object-fit:cover;">
                    <div><h2 style="font-family:var(--font-pixel); font-size:1.2rem;">WALI KELAS</h2><p style="font-size:0.8rem;">OK Yudistira Wibawa P.</p></div>
                </div>
            </div>`;

        const pGrid = document.getElementById('profile-grid');
        studentData.forEach((s, i) => {
            let rot = Math.floor(Math.random() * 6) - 3;
            pGrid.innerHTML += `
                <div class="scrap-card profile-item" data-name="${s.name.toLowerCase()}" style="transform: rotate(${rot}deg)" onclick="openStudent(${i})">
                    <div class="tape-deco"></div>
                    <div class="card-frame"><img src="${i+1}.jpg" loading="lazy"></div>
                    <p style="font-family:var(--font-pixel); font-size:0.85rem; line-height:1.2;">${s.name}</p>
                </div>`;
        });

        // --- MOMENTS LOADER ---
        const mGrid = document.getElementById('moment-grid');
        for(let i=1; i<=63; i++) {
            let rot = Math.floor(Math.random() * 8) - 4;
            mGrid.innerHTML += `
                <div class="scrap-card" style="transform: rotate(${rot}deg)" onclick="openMoment('moment${i}.jpeg', ${i})">
                    <div class="tape-deco"></div>
                    <div class="card-frame"><img src="moment${i}.jpeg" loading="lazy" onerror="this.src='https://placehold.co/400?text=Wait+Photo...'"></div>
                    <p style="text-align:right; font-family:var(--font-pixel); font-size:0.8rem;">#${i}</p>
                </div>`;
        }

        // Logic Functions
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active-tab'));
            document.getElementById('tab' + id.charAt(0).toUpperCase() + id.slice(1)).classList.add('active-tab');
            window.scrollTo(0,0);
        }

        function openWk() { setupModal('0.jpg', 'OK Yudistira Wibawa P.', '22 Juni 1998', 'Guru', 'Jika tidak bisa taat, jangan bunuh iman mu dengan maksiat', true); }
        
        function openStudent(idx) { 
            const s = studentData[idx]; 
            setupModal((idx+1)+'.jpg', s.name, s.birth, s.dream, s.quote, true); 
        }

        function openMoment(img, num) { setupModal(img, 'MOMENT', '', '', 'SNAPSHOT #' + num, false); }

        function setupModal(img, title, birth, dream, quote, showInfo) {
            const modalImg = document.getElementById('m-img');
            modalImg.src = img;
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-birth').innerText = birth;
            document.getElementById('m-dream').innerText = dream;
            document.getElementById('m-quote').innerText = quote;
            document.getElementById('m-info-personal').style.display = showInfo ? "block" : "none";

            // LOGIKA POSISI FOTO:
            // Daftar nama yang ingin dikembalikan ke posisi 'center' (tengah)
            const listCenter = ["fasya", "adam", "nayra", "noura", "rakayla", "raudhatul", "riffat", "rizky", "shidiq", "zaqiya"];
            const lowerTitle = title.toLowerCase();
            
            // Cek apakah judul mengandung salah satu nama di atas
            let shouldCenter = listCenter.some(name => lowerTitle.includes(name));

            if (shouldCenter) {
                modalImg.style.objectPosition = "center";
            } else {
                // Selain nama di atas (seperti Fachri, Dhiyaz, dll) tetap fokus 'top' agar kepala tidak terpotong
                modalImg.style.objectPosition = "top";
            }

            document.getElementById('modal').style.display = 'flex';
            document.querySelector('.modal-content').scrollTop = 0; 
        }

        function closeZoom() { document.getElementById('modal').style.display = 'none'; }

        function toggleMusic() {
            const audio = document.getElementById('bgm');
            const icon = document.getElementById('music-icon');
            const text = document.getElementById('music-text');
            if (audio.paused) {
                audio.play().then(() => {
                    icon.innerText = "🎸"; text.innerText = "AUDIO: ON";
                }).catch(e => alert("Ketuk layar terlebih dahulu!"));
            } else {
                audio.pause(); icon.innerText = "🔇"; text.innerText = "AUDIO: OFF";
            }
        }

        function filterProfiles() {
            let input = document.getElementById('searchBar').value.toLowerCase();
            document.querySelectorAll('.profile-item').forEach(item => {
                item.style.display = item.getAttribute('data-name').includes(input) ? "block" : "none";
            });
        }

        for(let i=0; i<15; i++) {
            let b = document.createElement('div'); b.className = 'bubble';
            b.style.width = b.style.height = (Math.random()*15+5)+'px';
            b.style.left = Math.random()*100+'%';
            b.style.animationDuration = (Math.random()*5+5)+'s';
            b.style.animationDelay = (Math.random()*5)+'s';
            document.body.appendChild(b);
        }
    </script>
</body>
</html>
